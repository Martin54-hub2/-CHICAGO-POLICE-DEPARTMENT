<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>District Management - CPD</title>
<link rel="icon" type="image/png" href="cpd-badge-favicon.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5}
.container{max-width:1400px;margin:2rem auto;padding:0 2rem}
.header{background:#fff;padding:2rem;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.08);margin-bottom:2rem;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:2rem;color:#1e3a8a}
.btn{padding:.625rem 1.5rem;border:none;border-radius:4px;font-size:.875rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:#0ea5e9;color:#fff}
.btn-primary:hover{background:#0284c7}
.btn-danger{background:#dc2626;color:#fff}
.btn-danger:hover{background:#b91c1c}
.btn-sm{padding:.5rem 1rem;font-size:.8rem}
.section{background:#fff;padding:2rem;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.08);margin-bottom:2rem}
.section h3{font-size:1.25rem;color:#2c3e50;margin-bottom:1.5rem}
.district-list{max-height:600px;overflow-y:auto}
.district-item{padding:1.5rem;border:2px solid #e5e7eb;border-radius:8px;margin-bottom:1rem;transition:all .2s}
.district-item:hover{background:#f9fafb}
.district-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.district-name{font-size:1.5rem;font-weight:700;color:#1e3a8a}
.district-streets{color:#64748b;font-size:.875rem;margin-top:.5rem;line-height:1.8}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;align-items:center;justify-content:center}
.modal.active{display:flex}
.modal-content{background:#fff;border-radius:12px;padding:2rem;max-width:600px;width:90%;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;margin-bottom:1.5rem}
.modal-title{font-size:1.5rem;font-weight:700}
.modal-close{background:none;border:none;font-size:1.5rem;cursor:pointer;color:#9ca3af}
.modal-close:hover{color:#2c3e50}
.form-group{margin-bottom:1.5rem}
.form-label{display:block;font-size:.875rem;font-weight:600;color:#374151;margin-bottom:.5rem}
.form-input,.form-textarea{width:100%;padding:.75rem 1rem;border:2px solid #e5e7eb;border-radius:6px;font-size:.9rem;font-family:inherit}
.form-textarea{min-height:150px;resize:vertical}
.form-input:focus,.form-textarea:focus{outline:none;border-color:#0284c7}
.back-link{display:inline-block;margin-bottom:1rem;color:#0ea5e9;text-decoration:none;font-weight:600}
.back-link:hover{color:#0284c7}
.empty-state{text-align:center;padding:3rem;color:#9ca3af;font-style:italic}
</style>
</head>
<body>

<div class="container">
<a href="index.html" class="back-link">← Back to Dashboard</a>

<div class="header">
<h1>🗺️ District Management</h1>
<button class="btn btn-danger" onclick="window.location.href='index.html'">Back to Site</button>
</div>

<div class="section">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem">
<h3 style="margin:0">Manage Police Districts</h3>
<button class="btn btn-primary" onclick="openModal('addDistrictModal')">+ Add District</button>
</div>
<div class="district-list" id="districtList"></div>
</div>
</div>

<!-- Add District Modal -->
<div id="addDistrictModal" class="modal">
<div class="modal-content">
<div class="modal-header">
<h3 class="modal-title">Add New District</h3>
<button class="modal-close" onclick="closeModal('addDistrictModal')">×</button>
</div>
<form onsubmit="addDistrict(event)">
<div class="form-group">
<label class="form-label">District Number</label>
<input type="text" class="form-input" name="number" placeholder="e.g., 001, 002, 003" required>
</div>
<div class="form-group">
<label class="form-label">District Name</label>
<input type="text" class="form-input" name="name" placeholder="e.g., Central, North, South" required>
</div>
<div class="form-group">
<label class="form-label">Streets Coverage (one per line)</label>
<textarea class="form-textarea" name="streets" placeholder="Example:&#10;100-500 N State St&#10;1-100 E Madison St&#10;200-400 W Washington Blvd&#10;&#10;Enter each street range on a new line" required></textarea>
</div>
<button type="submit" class="btn btn-primary" style="width:100%">Add District</button>
</form>
</div>
</div>

<!-- Edit District Modal -->
<div id="editDistrictModal" class="modal">
<div class="modal-content">
<div class="modal-header">
<h3 class="modal-title">Edit District</h3>
<button class="modal-close" onclick="closeModal('editDistrictModal')">×</button>
</div>
<form onsubmit="updateDistrict(event)">
<input type="hidden" id="editDistrictId">
<div class="form-group">
<label class="form-label">District Number</label>
<input type="text" class="form-input" id="editNumber" required>
</div>
<div class="form-group">
<label class="form-label">District Name</label>
<input type="text" class="form-input" id="editName" required>
</div>
<div class="form-group">
<label class="form-label">Streets Coverage (one per line)</label>
<textarea class="form-textarea" id="editStreets" required></textarea>
</div>
<button type="submit" class="btn btn-primary" style="width:100%">Update District</button>
</form>
</div>
</div>

<script>
// Database functions
const DB={
  init(){
    if(!localStorage.ccpd_districts){
      localStorage.ccpd_districts=JSON.stringify([
        {
          id:1,
          number:'001',
          name:'Central',
          streets:['100-500 N State St','1-100 E Madison St','200-400 W Washington Blvd','50-200 N Michigan Ave']
        },
        {
          id:2,
          number:'002',
          name:'Wentworth',
          streets:['1-500 S State St','100-300 E Cermak Rd','200-500 S Wabash Ave']
        },
        {
          id:3,
          number:'003',
          name:'Grand Crossing',
          streets:['6900-8700 S Cottage Grove Ave','7100-7500 S South Chicago Ave']
        }
      ]);
    }
  },
  getDistricts(){
    return JSON.parse(localStorage.ccpd_districts||'[]');
  },
  saveDistricts(districts){
    localStorage.ccpd_districts=JSON.stringify(districts);
  }
};

DB.init();

// Load districts
function loadDistricts(){
  const districts=DB.getDistricts();
  const list=document.getElementById('districtList');
  
  if(districts.length===0){
    list.innerHTML='<div class="empty-state">No districts yet. Click "+ Add District" to create one.</div>';
    return;
  }
  
  list.innerHTML=districts.map(d=>`
    <div class="district-item">
      <div class="district-header">
        <div class="district-name">District ${d.number} - ${d.name}</div>
        <div style="display:flex;gap:.5rem">
          <button class="btn btn-sm btn-primary" onclick="editDistrict(${d.id})">Edit</button>
          <button class="btn btn-sm btn-danger" onclick="deleteDistrict(${d.id})">Delete</button>
        </div>
      </div>
      <div class="district-streets">
        <strong>Streets Covered:</strong><br>
        ${d.streets.map(s=>`• ${s}`).join('<br>')}
      </div>
    </div>
  `).join('');
}

// Add district
function addDistrict(e){
  e.preventDefault();
  const form=e.target;
  const number=form.number.value.trim();
  const name=form.name.value.trim();
  const streets=form.streets.value.split('\n').filter(s=>s.trim()).map(s=>s.trim());
  
  if(streets.length===0){
    alert('Please enter at least one street');
    return false;
  }
  
  const districts=DB.getDistricts();
  districts.push({
    id:Date.now(),
    number,
    name,
    streets
  });
  
  DB.saveDistricts(districts);
  closeModal('addDistrictModal');
  form.reset();
  loadDistricts();
  return false;
}

// Edit district
function editDistrict(id){
  const districts=DB.getDistricts();
  const district=districts.find(d=>d.id===id);
  if(!district)return;
  
  document.getElementById('editDistrictId').value=id;
  document.getElementById('editNumber').value=district.number;
  document.getElementById('editName').value=district.name;
  document.getElementById('editStreets').value=district.streets.join('\n');
  
  openModal('editDistrictModal');
}

// Update district
function updateDistrict(e){
  e.preventDefault();
  const id=parseInt(document.getElementById('editDistrictId').value);
  const number=document.getElementById('editNumber').value.trim();
  const name=document.getElementById('editName').value.trim();
  const streets=document.getElementById('editStreets').value.split('\n').filter(s=>s.trim()).map(s=>s.trim());
  
  if(streets.length===0){
    alert('Please enter at least one street');
    return false;
  }
  
  const districts=DB.getDistricts();
  const index=districts.findIndex(d=>d.id===id);
  if(index===-1)return false;
  
  districts[index]={...districts[index],number,name,streets};
  DB.saveDistricts(districts);
  closeModal('editDistrictModal');
  loadDistricts();
  return false;
}

// Delete district
function deleteDistrict(id){
  if(!confirm('Are you sure you want to delete this district?'))return;
  const districts=DB.getDistricts().filter(d=>d.id!==id);
  DB.saveDistricts(districts);
  loadDistricts();
}

// Modal functions
function openModal(id){
  document.getElementById(id).classList.add('active');
}
function closeModal(id){
  document.getElementById(id).classList.remove('active');
}

// Load on page load
window.addEventListener('load',loadDistricts);
</script>

</body>
</html>
