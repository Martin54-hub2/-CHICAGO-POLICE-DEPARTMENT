<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MDT - Mobile Data Terminal</title>
<link rel="icon" type="image/png" href="cpd-badge-favicon.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Courier New',monospace;background:#0a0e1a;color:#00ff41;min-height:100vh}
.mdt-container{max-width:1600px;margin:0 auto;padding:1rem}
.mdt-header{background:#1a1f2e;border:2px solid #00ff41;padding:1rem;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center}
.mdt-title{font-size:1.5rem;font-weight:700;letter-spacing:2px}
.mdt-info{font-size:.875rem;opacity:.8}
.mdt-main{display:grid;grid-template-columns:350px 1fr;gap:1rem;min-height:calc(100vh - 120px)}
.mdt-sidebar{background:#1a1f2e;border:2px solid #00ff41;padding:1.5rem}
.mdt-content{background:#1a1f2e;border:2px solid #00ff41;padding:1.5rem;overflow-y:auto}
.search-box{margin-bottom:1.5rem}
.search-label{font-size:.875rem;margin-bottom:.5rem;display:block;color:#00ff41}
.search-input{width:100%;padding:.75rem;background:#0a0e1a;border:2px solid #00ff41;color:#00ff41;font-family:inherit;font-size:.9rem}
.search-input:focus{outline:none;border-color:#00ffff}
.btn{padding:.75rem 1.5rem;background:#00ff41;color:#0a0e1a;border:none;cursor:pointer;font-weight:700;font-family:inherit;margin-top:.5rem;width:100%;transition:all .2s}
.btn:hover{background:#00ffff;transform:translateY(-2px)}
.btn-secondary{background:#1a1f2e;color:#00ff41;border:2px solid #00ff41}
.btn-secondary:hover{background:#00ff41;color:#0a0e1a}
.menu-item{padding:.75rem;margin-bottom:.5rem;background:#0a0e1a;border-left:3px solid #00ff41;cursor:pointer;transition:all .2s}
.menu-item:hover,.menu-item.active{background:#00ff41;color:#0a0e1a}
.suspect-card{background:#0a0e1a;border:2px solid #00ff41;padding:1.5rem;margin-bottom:1rem;display:grid;grid-template-columns:150px 1fr;gap:1.5rem}
.mugshot{width:150px;height:180px;background:#1a1f2e;border:2px solid #00ff41;display:flex;align-items:center;justify-content:center;font-size:.75rem;text-align:center;object-fit:cover}
.suspect-info{display:grid;gap:.75rem}
.info-row{display:grid;grid-template-columns:150px 1fr;gap:1rem;padding:.5rem 0;border-bottom:1px solid #00ff41}
.info-label{font-weight:700}
.charges-list{margin-top:1rem;padding:1rem;background:#0a0e1a;border:2px solid #00ff41}
.charge-item{padding:.75rem;margin-bottom:.5rem;background:#1a1f2e;border-left:3px solid #ff4141}
.charge-header{display:flex;justify-content:space-between;margin-bottom:.5rem}
.charge-code{color:#ff4141;font-weight:700}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9999;align-items:center;justify-content:center}
.modal.active{display:flex}
.modal-content{background:#1a1f2e;border:2px solid #00ff41;padding:2rem;max-width:600px;width:90%;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:2px solid #00ff41}
.modal-title{font-size:1.5rem;font-weight:700}
.modal-close{background:none;border:none;color:#00ff41;font-size:2rem;cursor:pointer}
.form-group{margin-bottom:1.5rem}
.form-label{display:block;margin-bottom:.5rem;font-size:.875rem;color:#00ff41}
.form-input,.form-select{width:100%;padding:.75rem;background:#0a0e1a;border:2px solid #00ff41;color:#00ff41;font-family:inherit}
.penal-code-grid{display:grid;gap:.5rem;max-height:300px;overflow-y:auto;margin-top:.5rem}
.penal-code-item{padding:.75rem;background:#0a0e1a;border:2px solid #00ff41;cursor:pointer;transition:all .2s}
.penal-code-item:hover,.penal-code-item.selected{background:#00ff41;color:#0a0e1a}
.penal-code-title{font-weight:700;margin-bottom:.25rem}
.penal-code-penalty{font-size:.75rem;opacity:.8}
.empty-state{text-align:center;padding:3rem;opacity:.5;font-style:italic}
.status-badge{display:inline-block;padding:.25rem .75rem;background:#ff4141;color:#fff;font-size:.75rem;border-radius:3px;margin-left:.5rem}
.status-badge.wanted{background:#ff4141}
.status-badge.clear{background:#00ff41;color:#0a0e1a}
</style>
</head>
<body>

<div class="mdt-container">
<div class="mdt-header">
<div class="mdt-title">CHICAGO PD - MOBILE DATA TERMINAL</div>
<div class="mdt-info">
<span id="officerName">OFFICER: Loading...</span> | 
<span id="currentTime"></span>
</div>
</div>

<div class="mdt-main">
<!-- SIDEBAR -->
<div class="mdt-sidebar">
<div class="search-box">
<label class="search-label">SEARCH SUSPECT</label>
<input type="text" class="search-input" id="searchInput" placeholder="Name, ID, or Description">
<button class="btn" onclick="searchSuspect()">SEARCH</button>
</div>

<div style="margin:2rem 0;border-top:2px solid #00ff41;padding-top:2rem">
<div class="menu-item active" onclick="showView('search')">SEARCH</div>
<div class="menu-item" onclick="showView('add')">ADD SUSPECT</div>
<div class="menu-item" onclick="showView('codes')">PENAL CODES</div>
<div class="menu-item" onclick="window.location.href='index.html'">EXIT MDT</div>
</div>
</div>

<!-- MAIN CONTENT -->
<div class="mdt-content" id="mainContent">
<div class="empty-state">ENTER SEARCH QUERY OR SELECT AN OPTION</div>
</div>
</div>
</div>

<!-- ADD SUSPECT MODAL -->
<div id="addSuspectModal" class="modal">
<div class="modal-content">
<div class="modal-header">
<h3 class="modal-title">ADD SUSPECT TO SYSTEM</h3>
<button class="modal-close" onclick="closeModal('addSuspectModal')">×</button>
</div>
<form onsubmit="saveSuspect(event)">
<div class="form-group">
<label class="form-label">FULL NAME</label>
<input type="text" class="form-input" id="suspectName" required>
</div>
<div class="form-group">
<label class="form-label">AGE</label>
<input type="number" class="form-input" id="suspectAge" required>
</div>
<div class="form-group">
<label class="form-label">GENDER</label>
<select class="form-select" id="suspectGender" required>
<option value="Male">Male</option>
<option value="Female">Female</option>
<option value="Other">Other</option>
</select>
</div>
<div class="form-group">
<label class="form-label">RACE</label>
<input type="text" class="form-input" id="suspectRace" required>
</div>
<div class="form-group">
<label class="form-label">ADDRESS</label>
<input type="text" class="form-input" id="suspectAddress">
</div>
<div class="form-group">
<label class="form-label">DESCRIPTION</label>
<input type="text" class="form-input" id="suspectDescription" placeholder="Height, weight, distinguishing features">
</div>
<div class="form-group">
<label class="form-label">MUGSHOT (PHOTO)</label>
<input type="file" class="form-input" id="suspectMugshot" accept="image/*" onchange="previewMugshot()">
<img id="mugshotPreview" style="max-width:150px;margin-top:.5rem;display:none;border:2px solid #00ff41">
</div>
<button type="submit" class="btn">SAVE SUSPECT</button>
</form>
</div>
</div>

<!-- ADD CHARGE MODAL -->
<div id="addChargeModal" class="modal">
<div class="modal-content">
<div class="modal-header">
<h3 class="modal-title">ADD CHARGE</h3>
<button class="modal-close" onclick="closeModal('addChargeModal')">×</button>
</div>
<input type="hidden" id="chargeSuspectId">
<div class="form-group">
<label class="form-label">REASON / INCIDENT</label>
<input type="text" class="form-input" id="chargeReason" placeholder="e.g., Traffic Stop on Michigan Ave" required>
</div>
<div class="form-group">
<label class="form-label">SELECT PENAL CODE</label>
<div class="penal-code-grid" id="penalCodesList"></div>
</div>
<button class="btn" onclick="saveCharge()">ADD CHARGE</button>
</div>
</div>

<script>
// API Configuration
const API_URL = 'https://chicago-police-department-production.up.railway.app/api';

function getAuthToken() {
  return localStorage.getItem('authToken');
}

// Chicago Penal Codes (Static Data)
const PENAL_CODES = [
  { code: '720 ILCS 5/9-1', title: 'First Degree Murder', penalty: 'Life imprisonment or death penalty' },
  { code: '720 ILCS 5/12-3.2', title: 'Domestic Battery', penalty: 'Up to 1 year jail, $2,500 fine' },
  { code: '720 ILCS 5/18-2', title: 'Armed Robbery', penalty: '6-30 years prison' },
  { code: '720 ILCS 5/19-1', title: 'Burglary', penalty: '4-15 years prison' },
  { code: '720 ILCS 5/11-1.20', title: 'Criminal Sexual Assault', penalty: '4-15 years prison' },
  { code: '720 ILCS 5/16-1', title: 'Theft', penalty: 'Up to 10 years, varies by value' },
  { code: '720 ILCS 5/24-1.1', title: 'Unlawful Use of Weapons', penalty: '1-3 years prison' },
  { code: '720 ILCS 550/4', title: 'Cannabis Possession', penalty: 'Up to 6 months, $1,500 fine' },
  { code: '720 ILCS 570/402', title: 'Controlled Substance Possession', penalty: '1-15 years prison' },
  { code: '625 ILCS 5/11-501', title: 'DUI', penalty: 'Up to 1 year, license suspension' },
  { code: '720 ILCS 5/12-2', title: 'Aggravated Assault', penalty: 'Up to 5 years prison' },
  { code: '720 ILCS 5/12-3', title: 'Battery', penalty: 'Up to 1 year jail' },
  { code: '720 ILCS 5/10-2', title: 'Aggravated Kidnapping', penalty: '6-30 years prison' },
  { code: '720 ILCS 5/11-9.1', title: 'Sexual Exploitation of a Child', penalty: '6-30 years prison' },
  { code: '720 ILCS 5/33-3', title: 'Official Misconduct', penalty: '2-5 years prison' },
  { code: '720 ILCS 5/17-3', title: 'Identity Theft', penalty: '1-10 years prison' },
  { code: '720 ILCS 5/20-1', title: 'Arson', penalty: '4-30 years prison' },
  { code: '720 ILCS 5/31-1', title: 'Resisting a Peace Officer', penalty: 'Up to 1 year jail' },
  { code: '720 ILCS 5/21-1', title: 'Criminal Damage to Property', penalty: 'Up to 5 years prison' },
  { code: '720 ILCS 5/26-1', title: 'Disorderly Conduct', penalty: 'Up to 30 days jail, $1,500 fine' }
];

// Update time
function updateTime() {
  const now = new Date();
  document.getElementById('currentTime').textContent = now.toLocaleString();
}
setInterval(updateTime, 1000);
updateTime();

// Load officer info
const savedUser = localStorage.currentUser;
if (savedUser) {
  const user = JSON.parse(savedUser);
  document.getElementById('officerName').textContent = `OFFICER: ${user.name.toUpperCase()}`;
} else {
  document.getElementById('officerName').textContent = 'OFFICER: GUEST';
}

// View switching
function showView(view) {
  document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
  event.target.classList.add('active');
  
  const content = document.getElementById('mainContent');
  
  if (view === 'search') {
    content.innerHTML = '<div class="empty-state">ENTER SEARCH QUERY OR SELECT AN OPTION</div>';
  } else if (view === 'add') {
    document.getElementById('addSuspectModal').classList.add('active');
  } else if (view === 'codes') {
    displayPenalCodes();
  }
}

// Display penal codes reference
function displayPenalCodes() {
  const content = document.getElementById('mainContent');
  content.innerHTML = `
    <h2 style="margin-bottom:1.5rem;border-bottom:2px solid #00ff41;padding-bottom:1rem">ILLINOIS PENAL CODES REFERENCE</h2>
    ${PENAL_CODES.map(code => `
      <div class="charge-item">
        <div class="charge-header">
          <span class="charge-code">${code.code}</span>
        </div>
        <div style="font-weight:700;margin-bottom:.5rem">${code.title}</div>
        <div style="font-size:.875rem;opacity:.8">Penalty: ${code.penalty}</div>
      </div>
    `).join('')}
  `;
}

// Search suspects
async function searchSuspect() {
  const query = document.getElementById('searchInput').value.trim();
  if (!query) {
    alert('Enter a search query');
    return;
  }
  
  const content = document.getElementById('mainContent');
  content.innerHTML = '<div class="empty-state">SEARCHING DATABASE...</div>';
  
  try {
    const response = await fetch(`${API_URL}/suspects/search?q=${encodeURIComponent(query)}`);
    const suspects = await response.json();
    
    if (!Array.isArray(suspects) || suspects.length === 0) {
      content.innerHTML = '<div class="empty-state">NO RESULTS FOUND</div>';
      return;
    }
    
    content.innerHTML = suspects.map(suspect => displaySuspectCard(suspect)).join('');
  } catch (error) {
    console.error('Search error:', error);
    content.innerHTML = '<div class="empty-state">ERROR SEARCHING DATABASE</div>';
  }
}

// Display suspect card
function displaySuspectCard(suspect) {
  const hasWarrants = suspect.charges && suspect.charges.length > 0;
  return `
    <div class="suspect-card">
      <div>
        ${suspect.mugshot ? 
          `<img src="${suspect.mugshot}" class="mugshot" alt="Mugshot">` : 
          `<div class="mugshot">NO PHOTO</div>`
        }
      </div>
      <div class="suspect-info">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
          <h2 style="font-size:1.5rem">${suspect.name.toUpperCase()}</h2>
          <span class="status-badge ${hasWarrants ? 'wanted' : 'clear'}">
            ${hasWarrants ? 'HAS CHARGES' : 'CLEAR'}
          </span>
        </div>
        <div class="info-row">
          <span class="info-label">SUSPECT ID:</span>
          <span>${suspect._id}</span>
        </div>
        <div class="info-row">
          <span class="info-label">AGE:</span>
          <span>${suspect.age}</span>
        </div>
        <div class="info-row">
          <span class="info-label">GENDER:</span>
          <span>${suspect.gender}</span>
        </div>
        <div class="info-row">
          <span class="info-label">RACE:</span>
          <span>${suspect.race}</span>
        </div>
        <div class="info-row">
          <span class="info-label">ADDRESS:</span>
          <span>${suspect.address || 'UNKNOWN'}</span>
        </div>
        <div class="info-row">
          <span class="info-label">DESCRIPTION:</span>
          <span>${suspect.description || 'N/A'}</span>
        </div>
        
        <div class="charges-list">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
            <h3>CHARGES (${suspect.charges ? suspect.charges.length : 0})</h3>
            <button class="btn-secondary" style="padding:.5rem 1rem;width:auto" onclick="openAddChargeModal('${suspect._id}')">+ ADD CHARGE</button>
          </div>
          ${suspect.charges && suspect.charges.length > 0 ? 
            suspect.charges.map(charge => `
              <div class="charge-item">
                <div class="charge-header">
                  <span class="charge-code">${charge.code}</span>
                  <span style="font-size:.75rem">${charge.date}</span>
                </div>
                <div style="font-weight:700">${charge.title}</div>
                <div style="font-size:.875rem;margin-top:.5rem">Reason: ${charge.reason}</div>
              </div>
            `).join('') :
            '<div style="text-align:center;opacity:.5;padding:1rem">NO CHARGES ON RECORD</div>'
          }
        </div>
      </div>
    </div>
  `;
}

// Modal functions
function closeModal(modalId) {
  document.getElementById(modalId).classList.remove('active');
}

function previewMugshot() {
  const file = document.getElementById('suspectMugshot').files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = function(e) {
    document.getElementById('mugshotPreview').src = e.target.result;
    document.getElementById('mugshotPreview').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

// Save suspect
async function saveSuspect(e) {
  e.preventDefault();
  
  const token = getAuthToken();
  if (!token) {
    alert('Please login first');
    return;
  }
  
  const mugshotFile = document.getElementById('suspectMugshot').files[0];
  
  const processSave = async (mugshotData) => {
    const suspectData = {
      name: document.getElementById('suspectName').value,
      age: parseInt(document.getElementById('suspectAge').value),
      gender: document.getElementById('suspectGender').value,
      race: document.getElementById('suspectRace').value,
      address: document.getElementById('suspectAddress').value,
      description: document.getElementById('suspectDescription').value,
      mugshot: mugshotData || ''
    };
    
    try {
      const response = await fetch(`${API_URL}/suspects`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify(suspectData)
      });
      
      if (!response.ok) throw new Error('Failed to save suspect');
      
      alert('SUSPECT ADDED TO SYSTEM');
      closeModal('addSuspectModal');
      document.getElementById('suspectName').value = '';
      document.getElementById('suspectAge').value = '';
      document.getElementById('suspectAddress').value = '';
      document.getElementById('suspectDescription').value = '';
      document.getElementById('suspectMugshot').value = '';
      document.getElementById('mugshotPreview').style.display = 'none';
    } catch (error) {
      console.error('Error saving suspect:', error);
      alert('ERROR SAVING SUSPECT');
    }
  };
  
  if (mugshotFile) {
    const reader = new FileReader();
    reader.onload = function(e) {
      processSave(e.target.result);
    };
    reader.readAsDataURL(mugshotFile);
  } else {
    processSave(null);
  }
}

// Open add charge modal
function openAddChargeModal(suspectId) {
  document.getElementById('chargeSuspectId').value = suspectId;
  document.getElementById('chargeReason').value = '';
  
  const codesList = document.getElementById('penalCodesList');
  codesList.innerHTML = PENAL_CODES.map((code, index) => `
    <div class="penal-code-item" onclick="selectPenalCode(${index})">
      <div class="penal-code-title">${code.code} - ${code.title}</div>
      <div class="penal-code-penalty">${code.penalty}</div>
    </div>
  `).join('');
  
  document.getElementById('addChargeModal').classList.add('active');
}

let selectedPenalCode = null;

function selectPenalCode(index) {
  document.querySelectorAll('.penal-code-item').forEach(item => item.classList.remove('selected'));
  event.target.closest('.penal-code-item').classList.add('selected');
  selectedPenalCode = PENAL_CODES[index];
}

// Save charge
async function saveCharge() {
  const suspectId = document.getElementById('chargeSuspectId').value;
  const reason = document.getElementById('chargeReason').value;
  
  if (!reason || !selectedPenalCode) {
    alert('Please enter reason and select a penal code');
    return;
  }
  
  const token = getAuthToken();
  if (!token) {
    alert('Please login first');
    return;
  }
  
  try {
    const response = await fetch(`${API_URL}/suspects/${suspectId}/charges`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify({
        code: selectedPenalCode.code,
        title: selectedPenalCode.title,
        reason: reason
      })
    });
    
    if (!response.ok) throw new Error('Failed to add charge');
    
    alert('CHARGE ADDED');
    closeModal('addChargeModal');
    selectedPenalCode = null;
    searchSuspect(); // Refresh display
  } catch (error) {
    console.error('Error adding charge:', error);
    alert('ERROR ADDING CHARGE');
  }
}
</script>

</body>
</html>
