<!-- ========================================= -->
<!-- ENHANCED ADMIN PANEL WITH CMS -->
<!-- Replace your current admin-page div with this -->
<!-- ========================================= -->

<div id="admin-page" class="page">
<div class="page-title-bar"><div class="page-title">Admin Control Panel</div></div>
<div class="content-wrapper">

<!-- Admin Tabs -->
<div class="admin-tabs">
<button class="admin-tab active" onclick="switchAdminTab('officers')">Officers</button>
<button class="admin-tab" onclick="switchAdminTab('districts')">Districts</button>
<button class="admin-tab" onclick="switchAdminTab('posts')">News & Posts</button>
<button class="admin-tab" onclick="switchAdminTab('updates')">Updates</button>
</div>

<!-- Officers Tab -->
<div id="admin-tab-officers" class="admin-tab-content active">
<div class="admin-section">
<h3>Search Officers</h3>
<div class="search-box">
<input type="text" class="search-input" id="officerSearch" placeholder="Search by name, callsign, or username...">
<button class="btn btn-primary" onclick="searchOfficers()">Search</button>
</div>
<div class="officer-list" id="searchResults"></div>
</div>

<div class="admin-section">
<h3>Officer Management</h3>
<button class="btn btn-primary" onclick="openModal('addOfficerModal')">+ Add Officer</button>
<div class="officer-list" id="allOfficersList"></div>
</div>

<div class="admin-section">
<h3>All Reports</h3>
<div id="allReportsList"></div>
</div>
</div>

<!-- Districts Tab -->
<div id="admin-tab-districts" class="admin-tab-content">
<div class="admin-section">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem">
<h3>District Management</h3>
<button class="btn btn-primary" onclick="openModal('addDistrictModal')">+ Add District</button>
</div>
<div id="districtsList"></div>
</div>
</div>

<!-- Posts Tab -->
<div id="admin-tab-posts" class="admin-tab-content">
<div class="admin-section">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem">
<h3>News & Posts</h3>
<button class="btn btn-primary" onclick="openModal('addPostModal')">+ New Post</button>
</div>
<div id="postsList"></div>
</div>
</div>

<!-- Updates Tab -->
<div id="admin-tab-updates" class="admin-tab-content">
<div class="admin-section">
<h3>Post Department Update</h3>
<form onsubmit="postUpdate(event)">
<div class="form-group">
<label class="form-label">Title</label>
<input type="text" class="form-input" required>
</div>
<div class="form-group">
<label class="form-label">Content</label>
<textarea class="form-textarea" required></textarea>
</div>
<button type="submit" class="btn btn-primary">Post Update</button>
</form>
</div>
</div>

</div>
</div>

<!-- ========================================= -->
<!-- NEW MODALS FOR CMS -->
<!-- ========================================= -->

<!-- Add District Modal -->
<div id="addDistrictModal" class="modal">
<div class="modal-content">
<div class="modal-header">
<h3 class="modal-title">Add District</h3>
<button class="modal-close" onclick="closeModal('addDistrictModal')">×</button>
</div>
<form onsubmit="saveDistrict(event)">
<div class="form-group">
<label class="form-label">District Number *</label>
<input type="number" class="form-input" name="number" required>
</div>
<div class="form-group">
<label class="form-label">District Name *</label>
<input type="text" class="form-input" name="name" placeholder="e.g., Southside" required>
</div>
<div class="form-group">
<label class="form-label">Description</label>
<textarea class="form-textarea" name="description" placeholder="Brief description of this district"></textarea>
</div>
<div class="form-group">
<label class="form-label">Streets (one per line)</label>
<textarea class="form-textarea" name="streets" placeholder="Main St&#10;Oak Ave&#10;Elm Rd"></textarea>
</div>
<div class="form-group">
<label class="form-label">Boundaries</label>
<input type="text" class="form-input" name="boundaries" placeholder="North: X, South: Y, East: Z, West: W">
</div>
<div class="form-group">
<label class="form-label">Commander</label>
<input type="text" class="form-input" name="commander" placeholder="Captain John Smith">
</div>
<div class="form-group">
<label class="form-label">Phone</label>
<input type="text" class="form-input" name="phone" placeholder="(312) 123-4567">
</div>
<div class="form-group">
<label class="form-label">Address</label>
<input type="text" class="form-input" name="address" placeholder="123 Main St, Chicago, IL 60601">
</div>
<button type="submit" class="btn btn-primary">Save District</button>
</form>
</div>
</div>

<!-- Edit District Modal -->
<div id="editDistrictModal" class="modal">
<div class="modal-content">
<div class="modal-header">
<h3 class="modal-title">Edit District</h3>
<button class="modal-close" onclick="closeModal('editDistrictModal')">×</button>
</div>
<form onsubmit="updateDistrict(event)">
<input type="hidden" id="editDistrictNumber">
<div class="form-group">
<label class="form-label">District Name *</label>
<input type="text" class="form-input" id="editDistrictName" required>
</div>
<div class="form-group">
<label class="form-label">Description</label>
<textarea class="form-textarea" id="editDistrictDescription"></textarea>
</div>
<div class="form-group">
<label class="form-label">Streets (one per line)</label>
<textarea class="form-textarea" id="editDistrictStreets"></textarea>
</div>
<div class="form-group">
<label class="form-label">Boundaries</label>
<input type="text" class="form-input" id="editDistrictBoundaries">
</div>
<div class="form-group">
<label class="form-label">Commander</label>
<input type="text" class="form-input" id="editDistrictCommander">
</div>
<div class="form-group">
<label class="form-label">Phone</label>
<input type="text" class="form-input" id="editDistrictPhone">
</div>
<div class="form-group">
<label class="form-label">Address</label>
<input type="text" class="form-input" id="editDistrictAddress">
</div>
<button type="submit" class="btn btn-primary">Update District</button>
</form>
</div>
</div>

<!-- Add Post Modal -->
<div id="addPostModal" class="modal">
<div class="modal-content">
<div class="modal-header">
<h3 class="modal-title">Create Post</h3>
<button class="modal-close" onclick="closeModal('addPostModal')">×</button>
</div>
<form onsubmit="savePost(event)">
<div class="form-group">
<label class="form-label">Title *</label>
<input type="text" class="form-input" name="title" required>
</div>
<div class="form-group">
<label class="form-label">Category</label>
<select class="form-select" name="category">
<option value="news">News</option>
<option value="alert">Alert</option>
<option value="event">Event</option>
<option value="announcement">Announcement</option>
</select>
</div>
<div class="form-group">
<label class="form-label">Image</label>
<div style="display:flex;gap:.5rem">
<input type="text" class="form-input" id="postImageUrl" name="image" placeholder="/uploads/image.jpg" readonly>
<button type="button" class="btn btn-outline" onclick="uploadPostImage()">Upload</button>
</div>
<input type="file" id="postImageFile" accept="image/*" style="display:none" onchange="handlePostImageUpload(event)">
</div>
<div class="form-group">
<label class="form-label">Content *</label>
<textarea class="form-textarea" name="body" rows="8" required></textarea>
</div>
<div class="form-group">
<label class="form-label">
<input type="checkbox" name="featured"> Featured Post
</label>
</div>
<div class="form-group">
<label class="form-label">Tags (comma separated)</label>
<input type="text" class="form-input" name="tags" placeholder="community, safety, event">
</div>
<button type="submit" class="btn btn-primary">Publish Post</button>
</form>
</div>
</div>

<!-- Edit Post Modal -->
<div id="editPostModal" class="modal">
<div class="modal-content">
<div class="modal-header">
<h3 class="modal-title">Edit Post</h3>
<button class="modal-close" onclick="closeModal('editPostModal')">×</button>
</div>
<form onsubmit="updatePost(event)">
<input type="hidden" id="editPostId">
<div class="form-group">
<label class="form-label">Title *</label>
<input type="text" class="form-input" id="editPostTitle" required>
</div>
<div class="form-group">
<label class="form-label">Category</label>
<select class="form-select" id="editPostCategory">
<option value="news">News</option>
<option value="alert">Alert</option>
<option value="event">Event</option>
<option value="announcement">Announcement</option>
</select>
</div>
<div class="form-group">
<label class="form-label">Image</label>
<div style="display:flex;gap:.5rem">
<input type="text" class="form-input" id="editPostImageUrl" readonly>
<button type="button" class="btn btn-outline" onclick="uploadEditPostImage()">Upload</button>
</div>
<input type="file" id="editPostImageFile" accept="image/*" style="display:none" onchange="handleEditPostImageUpload(event)">
</div>
<div class="form-group">
<label class="form-label">Content *</label>
<textarea class="form-textarea" id="editPostBody" rows="8" required></textarea>
</div>
<div class="form-group">
<label class="form-label">
<input type="checkbox" id="editPostFeatured"> Featured Post
</label>
</div>
<div class="form-group">
<label class="form-label">Tags (comma separated)</label>
<input type="text" class="form-input" id="editPostTags">
</div>
<button type="submit" class="btn btn-primary">Update Post</button>
</form>
</div>
</div>

<!-- ========================================= -->
<!-- ADDITIONAL CSS FOR CMS -->
<!-- Add this to your <style> section -->
<!-- ========================================= -->
<style>
.admin-tabs{display:flex;gap:1rem;margin-bottom:2rem;border-bottom:2px solid #e5e7eb}
.admin-tab{padding:1rem 1.5rem;border:none;background:none;font-size:.95rem;font-weight:600;color:#6b7280;cursor:pointer;position:relative;transition:color .2s}
.admin-tab:hover{color:#0284c7}
.admin-tab.active{color:#0284c7}
.admin-tab.active::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;background:#0284c7}
.admin-tab-content{display:none}
.admin-tab-content.active{display:block}
.district-card,.post-card{padding:1.5rem;border:1px solid #e5e7eb;border-radius:8px;margin-bottom:1rem;background:#fff}
.district-card:hover,.post-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.card-header{display:flex;justify-content:space-between;align-items:start;margin-bottom:1rem}
.card-title{font-size:1.1rem;font-weight:600;color:#2c3e50}
.card-meta{display:flex;gap:1.5rem;margin-top:.5rem;font-size:.875rem;color:#6b7280}
.card-actions{display:flex;gap:.5rem}
.post-image{width:120px;height:80px;object-fit:cover;border-radius:4px;margin-right:1rem}
</style>
